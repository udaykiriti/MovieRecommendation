{% extends 'base.html' %}

{% block title %}Login - MovieRecommendation{% endblock %}

{% block content %}
<main class="content">
    <div class="auth-container">
        <h2>Login</h2>
        
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer; margin-top: 10px; padding: 14px;">Login</button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="{% url 'movie:signup' %}">Sign Up</a>
        </div>
    </div>
</main>
{% endblock %}

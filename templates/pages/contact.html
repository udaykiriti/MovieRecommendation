{% extends 'base.html' %}

{% block title %}Contact Us - CineStream{% endblock %}

{% block content %}
<main class="content">
    <div class="auth-page-wrapper" style="padding-top: 50px;">
        <div class="auth-glass-card" style="max-width: 600px;">
            <h2>Contact Us</h2>
            <p class="auth-subtitle">
                Have questions, suggestions, or just want to say hello? Drop us a message below!
            </p>
            
            <form method="POST">
                {% csrf_token %}
                <div class="cool-form-group">
                    <label>Name</label>
                    <input type="text" name="name" class="cool-input" required placeholder="Your Name" value="{{ user.username }}">
                </div>
                <div class="cool-form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="cool-input" required placeholder="Your Email" value="{{ user.email }}">
                </div>
                <div class="cool-form-group">
                    <label>Message</label>
                    <textarea name="message" class="cool-input" required placeholder="Your Message" rows="5"></textarea>
                </div>
                
                <button type="submit" class="cool-btn" style="width: 100%;">
                    <span>Send Message</span>
                </button>
            </form>
        </div>
    </div>
</main>
{% endblock %}
